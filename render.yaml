services:
  - type: web
    name: signai-isl-translator
    env: python
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/"
    startCommand: "python -m uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: EMERGENT_LLM_KEY
        value: sk-emergent-03a1c1b0f6b0bBaFc6
